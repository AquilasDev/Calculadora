<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora | Aquilas Oliveira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* =============================================
       VARIÁVEIS DE TEMA — mesmo padrão do portfólio
    ============================================= */
    :root {
      --bg:        #f5f3ee;
      --surface:   #ffffff;
      --text:      #1a1a1a;
      --muted:     #888;
      --accent:    #c8522a;
      --accent-dk: #a03d1a;
      --border:    #e0dbd2;
      --btn-num:   #ffffff;
      --btn-op:    #fff3ee;
      --btn-eq:    #c8522a;
      --btn-fn:    #f0ebe3;
      --btn-clr:   #fff0ed;
      --display:   #1a1a1a;
      --shadow:    0 2px 12px rgba(0,0,0,0.07);
    }

    body.dark {
      --bg:        #111210;
      --surface:   #1c1c1a;
      --text:      #ede8e0;
      --muted:     #6b6660;
      --accent:    #e06a3a;
      --accent-dk: #c8522a;
      --border:    #2e2d2a;
      --btn-num:   #242422;
      --btn-op:    #2e1f16;
      --btn-eq:    #c8522a;
      --btn-fn:    #1e1d1a;
      --btn-clr:   #2e1a16;
      --display:   #ede8e0;
      --shadow:    0 2px 16px rgba(0,0,0,0.4);
    }

    /* =============================================
       RESET & BASE
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.3s, color 0.3s;
    }

    /* =============================================
       CABEÇALHO
    ============================================= */
    header {
      width: 100%;
      max-width: 680px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .back-link {
      font-size: 0.88rem;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }

    .header-right { display: flex; gap: 0.6rem; align-items: center; }

    /* Botão modo científico / normal */
    .mode-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background 0.2s, color 0.2s;
    }
    .mode-btn:hover, .mode-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Botão tema */
    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 999px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }
    .theme-btn:hover { background: var(--border); }

    /* =============================================
       CONTAINER DA CALCULADORA
    ============================================= */
    .calc-wrapper {
      width: 100%;
      max-width: 340px;          /* Modo normal: estreito */
      transition: max-width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Modo científico: expande horizontalmente */
    .calc-wrapper.scientific {
      max-width: 680px;
    }

    .calculator {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    /* =============================================
       DISPLAY
    ============================================= */
    .display {
      padding: 1.5rem 1.5rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      text-align: right;
    }

    /* Histórico da operação acima do resultado */
    #history {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.2rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: rtl;
    }

    /* Número principal */
    #result {
      font-family: 'DM Mono', monospace;
      font-size: 2.4rem;
      font-weight: 500;
      color: var(--display);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      direction: rtl;
      transition: font-size 0.15s;
    }

    /* Reduz fonte quando número for grande */
    #result.small { font-size: 1.6rem; }

    /* =============================================
       GRID DE BOTÕES
    ============================================= */
    .buttons-area {
      display: grid;
      padding: 1rem;
      gap: 8px;
    }

    /* Modo normal: 4 colunas */
    .buttons-area { grid-template-columns: repeat(4, 1fr); }

    /* Modo científico: grid de 8 colunas
       lado esquerdo = funções científicas (4 cols)
       lado direito  = calculadora normal (4 cols) */
    .calc-wrapper.scientific .buttons-area {
      grid-template-columns: repeat(8, 1fr);
    }

    /* =============================================
       BOTÕES
    ============================================= */
    .btn {
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: filter 0.1s, transform 0.08s;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active { transform: scale(0.94); filter: brightness(0.92); }

    /* Tipos de botão */
    .btn-num  { background: var(--btn-num);  color: var(--text);   border: 1px solid var(--border); }
    .btn-op   { background: var(--btn-op);   color: var(--accent); border: 1px solid var(--border); font-weight: 700; }
    .btn-eq   { background: var(--btn-eq);   color: #fff;          font-weight: 700; font-size: 1.3rem; }
    .btn-clr  { background: var(--btn-clr);  color: #c0392b;       border: 1px solid var(--border); }
    .btn-fn   { background: var(--btn-fn);   color: var(--muted);  border: 1px solid var(--border); font-size: 0.82rem; }

    /* Botão zero ocupa 2 colunas no modo normal */
    .span2 { grid-column: span 2; }

    /* Botões científicos ficam ocultos no modo normal */
    .sci-btn { display: none; }
    .calc-wrapper.scientific .sci-btn { display: flex; }

    /* =============================================
       RODAPÉ
    ============================================= */
    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>

  <!-- ===== CABEÇALHO ===== -->
  <header>
    <a href="index.html" class="back-link">← Voltar ao portfólio</a>

    <div class="header-right">
      <!-- Botão que alterna entre modo normal e científico -->
      <button class="mode-btn" id="mode-toggle" title="Alternar modo científico">
        <span id="mode-icon">⇄</span>
        <span id="mode-label">Científica</span>
      </button>

      <!-- Botão de tema claro/escuro -->
      <button class="theme-btn" id="theme-btn" aria-label="Alternar tema">🌙</button>
    </div>
  </header>

  <!-- ===== CALCULADORA ===== -->
  <div class="calc-wrapper" id="calc-wrapper">
    <div class="calculator">

      <!-- Display -->
      <div class="display">
        <div id="history"></div>
        <div id="result">0</div>
      </div>

      <!-- Grade de botões -->
      <!--
        Estrutura:
        - Em modo NORMAL (4 colunas): botões .sci-btn ficam ocultos via CSS
        - Em modo CIENTÍFICO (8 colunas): botões .sci-btn são exibidos à esquerda
      -->
      <div class="buttons-area" id="buttons">

        <!-- ===== BOTÕES CIENTÍFICOS (coluna esquerda, 4 colunas) ===== -->
        <!-- Aparecem apenas no modo científico -->

        <!-- Linha 1 - funções trigonométricas -->
        <button class="btn btn-fn sci-btn" data-action="sin">sin</button>
        <button class="btn btn-fn sci-btn" data-action="cos">cos</button>
        <button class="btn btn-fn sci-btn" data-action="tan">tan</button>
        <button class="btn btn-fn sci-btn" data-action="inv">INV</button>

        <!-- Linha 2 - logaritmos e raiz -->
        <button class="btn btn-fn sci-btn" data-action="log">log</button>
        <button class="btn btn-fn sci-btn" data-action="ln">ln</button>
        <button class="btn btn-fn sci-btn" data-action="sqrt">√</button>
        <button class="btn btn-fn sci-btn" data-action="cbrt">∛</button>

        <!-- Linha 3 - potências e constantes -->
        <button class="btn btn-fn sci-btn" data-action="pow2">x²</button>
        <button class="btn btn-fn sci-btn" data-action="pow3">x³</button>
        <button class="btn btn-fn sci-btn" data-action="powy">xʸ</button>
        <button class="btn btn-fn sci-btn" data-action="inv-x">1/x</button>

        <!-- Linha 4 - constantes e conversões -->
        <button class="btn btn-fn sci-btn" data-action="pi">π</button>
        <button class="btn btn-fn sci-btn" data-action="e">e</button>
        <button class="btn btn-fn sci-btn" data-action="abs">|x|</button>
        <button class="btn btn-fn sci-btn" data-action="fact">n!</button>

        <!-- Linha 5 - parênteses e outros -->
        <button class="btn btn-fn sci-btn" data-action="open-par">(</button>
        <button class="btn btn-fn sci-btn" data-action="close-par">)</button>
        <button class="btn btn-fn sci-btn" data-action="deg-rad" id="deg-rad-btn">DEG</button>
        <button class="btn btn-fn sci-btn" data-action="exp">EXP</button>

        <!-- ===== BOTÕES NORMAIS (sempre visíveis, 4 colunas) ===== -->

        <!-- Linha 1 - limpar e operadores básicos -->
        <button class="btn btn-clr" data-action="clear">C</button>
        <button class="btn btn-fn"  data-action="sign">±</button>
        <button class="btn btn-fn"  data-action="percent">%</button>
        <button class="btn btn-op"  data-action="op" data-op="÷">÷</button>

        <!-- Linha 2 -->
        <button class="btn btn-num" data-action="num" data-val="7">7</button>
        <button class="btn btn-num" data-action="num" data-val="8">8</button>
        <button class="btn btn-num" data-action="num" data-val="9">9</button>
        <button class="btn btn-op"  data-action="op" data-op="×">×</button>

        <!-- Linha 3 -->
        <button class="btn btn-num" data-action="num" data-val="4">4</button>
        <button class="btn btn-num" data-action="num" data-val="5">5</button>
        <button class="btn btn-num" data-action="num" data-val="6">6</button>
        <button class="btn btn-op"  data-action="op" data-op="−">−</button>

        <!-- Linha 4 -->
        <button class="btn btn-num" data-action="num" data-val="1">1</button>
        <button class="btn btn-num" data-action="num" data-val="2">2</button>
        <button class="btn btn-num" data-action="num" data-val="3">3</button>
        <button class="btn btn-op"  data-action="op" data-op="+">+</button>

        <!-- Linha 5 - zero ocupa 2 colunas no modo normal -->
        <button class="btn btn-num span2" data-action="num" data-val="0" id="zero-btn">0</button>
        <button class="btn btn-num" data-action="dot">.</button>
        <button class="btn btn-eq"  data-action="equals">=</button>

      </div>
    </div>
  </div>

  <footer>
    Projeto desenvolvido por <a href="index.html">Aquilas Oliveira</a> · HTML5 · CSS3 · JavaScript
  </footer>


  <script>
    /* =============================================
       ESTADO DA CALCULADORA
    ============================================= */
    var state = {
      current:    '0',      // Número sendo digitado
      previous:   null,     // Número anterior (antes do operador)
      operator:   null,     // Operador selecionado
      waiting:    false,    // Aguardando novo número após operador
      history:    '',       // Texto do display de histórico
      isRad:      false,    // Modo radianos ou graus
      isInverse:  false,    // Modo inverso (para sin→asin etc.)
      paren:      0,        // Contador de parênteses abertos
      powerMode:  false,    // Aguardando expoente (xʸ)
    };

    /* =============================================
       REFERÊNCIAS DO DOM
    ============================================= */
    var resultEl  = document.getElementById('result');
    var historyEl = document.getElementById('history');
    var wrapper   = document.getElementById('calc-wrapper');
    var modeBtn   = document.getElementById('mode-toggle');
    var modeLabel = document.getElementById('mode-label');
    var themeBtn  = document.getElementById('theme-btn');
    var zeroBtn   = document.getElementById('zero-btn');
    var degRadBtn = document.getElementById('deg-rad-btn');

    /* =============================================
       ATUALIZA O DISPLAY
    ============================================= */
    function updateDisplay() {
      var txt = state.current;

      // Formata número grande com separador de milhar (se não tiver ponto)
      if (!txt.includes('.') && !txt.includes('e') && !isNaN(parseFloat(txt))) {
        var n = parseFloat(txt);
        if (Math.abs(n) >= 1e15) {
          txt = n.toExponential(6);
        }
      }

      resultEl.textContent = txt;
      historyEl.textContent = state.history;

      // Reduz fonte para números grandes
      resultEl.classList.toggle('small', txt.length > 10);
    }

    /* =============================================
       CONVERTE GRAUS → RADIANOS (se necessário)
    ============================================= */
    function toRad(n) {
      return state.isRad ? n : n * (Math.PI / 180);
    }

    /* =============================================
       FATORIAL (função recursiva simples)
    ============================================= */
    function factorial(n) {
      n = Math.round(n);
      if (n < 0)  return NaN;
      if (n === 0 || n === 1) return 1;
      if (n > 170) return Infinity;  // Limite do JS
      var result = 1;
      for (var i = 2; i <= n; i++) { result *= i; }
      return result;
    }

    /* =============================================
       PROCESSA NÚMEROS DIGITADOS
    ============================================= */
    function inputNumber(val) {
      if (state.waiting) {
        state.current = val;
        state.waiting = false;
      } else {
        // Limita tamanho do número para não transbordar o display
        if (state.current.replace('-', '').length >= 14) return;
        state.current = state.current === '0' ? val : state.current + val;
      }
      updateDisplay();
    }

    /* =============================================
       PONTO DECIMAL
    ============================================= */
    function inputDot() {
      if (state.waiting) {
        state.current = '0.';
        state.waiting = false;
      } else if (!state.current.includes('.')) {
        state.current += '.';
      }
      updateDisplay();
    }

    /* =============================================
       OPERADORES BINÁRIOS ( + − × ÷ )
    ============================================= */
    function inputOperator(op) {
      var curr = parseFloat(state.current);

      // Se já há uma operação pendente, calcula antes de aplicar nova
      if (state.operator && !state.waiting) {
        curr = calculate(parseFloat(state.previous), curr, state.operator);
        state.current = formatResult(curr);
      }

      state.previous = state.current;
      state.operator = op;
      state.waiting  = true;
      state.history  = state.previous + ' ' + op;
      updateDisplay();
    }

    /* =============================================
       CALCULA O RESULTADO FINAL ( = )
    ============================================= */
    function equals() {
      if (!state.operator || state.waiting) return;

      var a = parseFloat(state.previous);
      var b = parseFloat(state.current);
      var res = calculate(a, b, state.operator);

      state.history  = state.previous + ' ' + state.operator + ' ' + state.current + ' =';
      state.current  = formatResult(res);
      state.previous = null;
      state.operator = null;
      state.waiting  = true;
      updateDisplay();
    }

    /* =============================================
       MOTOR DE CÁLCULO BINÁRIO
    ============================================= */
    function calculate(a, b, op) {
      switch (op) {
        case '+':  return a + b;
        case '−':  return a - b;
        case '×':  return a * b;
        case '÷':  return b === 0 ? 'Erro' : a / b;
        case '^':  return Math.pow(a, b);  // Usado pelo modo xʸ
        default:   return b;
      }
    }

    /* =============================================
       FORMATA RESULTADO PARA EXIBIÇÃO
    ============================================= */
    function formatResult(val) {
      if (val === 'Erro' || isNaN(val)) return 'Erro';
      if (!isFinite(val)) return val > 0 ? 'Infinito' : '-Infinito';

      // Remove imprecisão de ponto flutuante (ex: 0.1 + 0.2 = 0.3)
      var fixed = parseFloat(val.toPrecision(12));
      var str   = String(fixed);

      // Usa notação científica se número muito grande/pequeno
      if (Math.abs(fixed) >= 1e15 || (Math.abs(fixed) < 1e-10 && fixed !== 0)) {
        str = fixed.toExponential(6);
      }

      return str;
    }

    /* =============================================
       FUNÇÕES CIENTÍFICAS (unárias)
    ============================================= */
    function scientificAction(action) {
      var n   = parseFloat(state.current);
      var res;

      switch (action) {
        /* ---- Trigonométricas ---- */
        case 'sin':  res = state.isInverse ? Math.asin(n) * (state.isRad ? 1 : 180/Math.PI)  : Math.sin(toRad(n)); break;
        case 'cos':  res = state.isInverse ? Math.acos(n) * (state.isRad ? 1 : 180/Math.PI)  : Math.cos(toRad(n)); break;
        case 'tan':  res = state.isInverse ? Math.atan(n) * (state.isRad ? 1 : 180/Math.PI)  : Math.tan(toRad(n)); break;

        /* ---- Logaritmos ---- */
        case 'log':  res = state.isInverse ? Math.pow(10, n) : Math.log10(n); break;
        case 'ln':   res = state.isInverse ? Math.exp(n)     : Math.log(n);   break;

        /* ---- Raízes ---- */
        case 'sqrt': res = state.isInverse ? n * n        : Math.sqrt(n); break;
        case 'cbrt': res = state.isInverse ? Math.pow(n, 3) : Math.cbrt(n); break;

        /* ---- Potências ---- */
        case 'pow2': res = Math.pow(n, 2); break;
        case 'pow3': res = Math.pow(n, 3); break;
        case 'inv-x': res = n !== 0 ? 1 / n : 'Erro'; break;

        /* ---- Constantes ---- */
        case 'pi':
          state.current = String(Math.PI);
          state.history = 'π';
          state.waiting = true;
          updateDisplay();
          return;

        case 'e':
          state.current = String(Math.E);
          state.history = 'e';
          state.waiting = true;
          updateDisplay();
          return;

        /* ---- Outras ---- */
        case 'abs':  res = Math.abs(n);    break;
        case 'fact': res = factorial(n);   break;
        case 'exp':  // Inicia digitação de expoente (×10^)
          state.current  = state.current + 'e';
          state.history  = state.current;
          updateDisplay();
          return;

        /* ---- Modo xʸ: define operador ^ e aguarda expoente ---- */
        case 'powy':
          state.previous = state.current;
          state.operator = '^';
          state.waiting  = true;
          state.history  = state.current + ' ^';
          updateDisplay();
          return;

        /* ---- Inverso (inverte funções: sin↔asin etc.) ---- */
        case 'inv':
          state.isInverse = !state.isInverse;
          /* Atualiza rótulos dos botões para mostrar funções inversas */
          document.querySelectorAll('[data-action="sin"]')[0].textContent = state.isInverse ? 'asin' : 'sin';
          document.querySelectorAll('[data-action="cos"]')[0].textContent = state.isInverse ? 'acos' : 'cos';
          document.querySelectorAll('[data-action="tan"]')[0].textContent = state.isInverse ? 'atan' : 'tan';
          document.querySelectorAll('[data-action="log"]')[0].textContent = state.isInverse ? '10ˣ'  : 'log';
          document.querySelectorAll('[data-action="ln"]')[0].textContent  = state.isInverse ? 'eˣ'   : 'ln';
          document.querySelectorAll('[data-action="sqrt"]')[0].textContent = state.isInverse ? 'x²'  : '√';
          return;

        /* ---- DEG ↔ RAD ---- */
        case 'deg-rad':
          state.isRad = !state.isRad;
          degRadBtn.textContent = state.isRad ? 'RAD' : 'DEG';
          return;

        /* ---- Parênteses (simplificado) ---- */
        case 'open-par':
          state.history += '(';
          state.paren++;
          updateDisplay();
          return;
        case 'close-par':
          if (state.paren > 0) {
            state.history += ')';
            state.paren--;
          }
          updateDisplay();
          return;

        default: return;
      }

      /* Atualiza display com resultado da função científica */
      var label = action === 'abs' ? '|' + n + '|' : action + '(' + n + ')';
      state.history  = label + ' =';
      state.current  = formatResult(res);
      state.waiting  = true;
      updateDisplay();
    }

    /* =============================================
       LIMPAR TUDO (C)
    ============================================= */
    function clearAll() {
      state.current   = '0';
      state.previous  = null;
      state.operator  = null;
      state.waiting   = false;
      state.history   = '';
      state.isInverse = false;
      state.paren     = 0;
      updateDisplay();
    }

    /* =============================================
       INVERTER SINAL (±)
    ============================================= */
    function toggleSign() {
      if (state.current === '0' || state.current === 'Erro') return;
      state.current = state.current.startsWith('-')
        ? state.current.slice(1)
        : '-' + state.current;
      updateDisplay();
    }

    /* =============================================
       PORCENTAGEM (%)
    ============================================= */
    function percent() {
      var n = parseFloat(state.current);
      if (isNaN(n)) return;
      /* Se há operação pendente, calcula % relativa ao valor anterior */
      if (state.previous !== null) {
        state.current = formatResult(parseFloat(state.previous) * n / 100);
      } else {
        state.current = formatResult(n / 100);
      }
      updateDisplay();
    }

    /* =============================================
       DELEGAÇÃO DE CLIQUES NOS BOTÕES
       Um único event listener no container de botões
       para melhor performance
    ============================================= */
    document.getElementById('buttons').addEventListener('click', function (e) {
      var btn = e.target.closest('.btn');
      if (!btn) return;

      var action = btn.dataset.action;

      switch (action) {
        case 'num':     inputNumber(btn.dataset.val); break;
        case 'dot':     inputDot();                    break;
        case 'op':      inputOperator(btn.dataset.op); break;
        case 'equals':  equals();                      break;
        case 'clear':   clearAll();                    break;
        case 'sign':    toggleSign();                  break;
        case 'percent': percent();                     break;
        default:        scientificAction(action);       break;
      }
    });

    /* =============================================
       SUPORTE AO TECLADO
       Permite usar o teclado físico para digitar
    ============================================= */
    document.addEventListener('keydown', function (e) {
      /* Ignora quando foco está em um input de texto */
      if (e.target.tagName === 'INPUT') return;

      var key = e.key;

      if (key >= '0' && key <= '9') { inputNumber(key); }
      else if (key === '.')  { inputDot(); }
      else if (key === '+')  { inputOperator('+'); }
      else if (key === '-')  { inputOperator('−'); }
      else if (key === '*')  { inputOperator('×'); }
      else if (key === '/')  { e.preventDefault(); inputOperator('÷'); }
      else if (key === 'Enter' || key === '=') { equals(); }
      else if (key === 'Escape' || key === 'c' || key === 'C') { clearAll(); }
      else if (key === 'Backspace') {
        /* Apaga último dígito */
        if (state.current.length > 1 && !state.waiting) {
          state.current = state.current.slice(0, -1) || '0';
          updateDisplay();
        } else {
          clearAll();
        }
      }
    });

    /* =============================================
       MODO CIENTÍFICO / NORMAL
       Alterna entre layout vertical (normal) e
       horizontal (científico)
    ============================================= */
    var isScientific = false;

    modeBtn.addEventListener('click', function () {
      isScientific = !isScientific;
      wrapper.classList.toggle('scientific', isScientific);

      /* Ajusta o botão zero: span2 no modo normal, span1 no científico */
      zeroBtn.classList.toggle('span2', !isScientific);

      modeLabel.textContent = isScientific ? 'Normal' : 'Científica';
      modeBtn.classList.toggle('active', isScientific);
    });

    /* =============================================
       ALTERNÂNCIA DE TEMA CLARO / ESCURO
    ============================================= */
    var savedTheme  = localStorage.getItem('calc-tema');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

    if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
      document.body.classList.add('dark');
      themeBtn.textContent = '☀️';
    }

    themeBtn.addEventListener('click', function () {
      var isDark = document.body.classList.toggle('dark');
      themeBtn.textContent = isDark ? '☀️' : '🌙';
      localStorage.setItem('calc-tema', isDark ? 'dark' : 'light');
    });

    /* Inicializa o display */
    updateDisplay();
  </script>

</body>
</html>
